# In-memory DB for tests (CI has no Postgres). Flyway off — Hibernate creates schema.
spring.datasource.url=jdbc:h2:mem:trading_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
