spring.application.name=trading-engine

# Graceful shutdown (SIGTERM): finish in-flight HTTP requests before stopping.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# Actuator: health (incl. DB), Prometheus scrape format, build info for /actuator/info
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=never
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=${spring.application.name}

# Expose info.app.* (and other info.* keys) on /actuator/info — disabled by default in Spring Boot 3+
management.info.env.enabled=true

info.app.name=Trading Engine
info.app.description=Price-time priority limit-order matching (demo)

# OpenAPI / Swagger UI (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# PostgreSQL (Neon)
spring.datasource.url=jdbc:postgresql://ep-misty-wildflower-amsbotcd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Local configuration
spring.config.import=optional:file:./application-local.properties

# Schema is created/updated by Flyway (db/migration). Hibernate only validates mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
