spring.application.name=trading-engine

# OpenAPI / Swagger UI (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# PostgreSQL (Neon)
spring.datasource.url=jdbc:postgresql://ep-misty-wildflower-amsbotcd-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Local configuration
spring.config.import=optional:file:./application-local.properties

# Schema is created/updated by Flyway (db/migration). Hibernate only validates mapping.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
