spring.application.name=trading-engine

# OpenAPI / Swagger UI (springdoc)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# PostgreSQL (defaults target your laptop DB; override with env vars if needed)
spring.datasource.url=${DB_URL:jdbc:postgresql://192.168.4.42:5432/trading_engine}
spring.datasource.username=${DB_USERNAME:trading_user}
spring.datasource.password=${DB_PASSWORD:trading_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate (temporary simple setup; Flyway can replace this later)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
